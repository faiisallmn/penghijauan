name: Daily Auto Commit

on:
  schedule:
    # Jalankan setiap hari jam 10:00 WIB (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch: # Bisa dijalankan manual juga

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: Run auto commit script
        run: python auto_commit.py
      
      - name: Commit and push changes
        run: |
          git add activity.log
          git diff --staged --quiet || git commit -m "🌱 Auto commit: $(date '+%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
